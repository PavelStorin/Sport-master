<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Спортмастер — спортивный магазин для всей семьи!</title>
    <link rel="stylesheet" href="./styles/style.css" />
    <link
      rel="icon"
      type="image/png"
      href="https://cdn.sportmaster.ru/upload/content/application/ru_sm3/prod/front/public/pwa/icon-180.png"
    />
  </head>

  <body>
    <header class="header">
      <div class="header__top">
        <div class="container header__container">
          <button class="header__top-btn" type="button">Фрязино</button>
          <nav class="header__top-nav top-nav">
            <a href="tel:+74957777771" class="top-nav__link">8 495 777-777-1</a>
            <a href="/stores" class="top-nav__link">Магазины</a>
            <a href="/delivery" class="top-nav__link">Доставка и оплата</a>
            <a href="/marketplace" class="top-nav__link"
              >Продавай на Спортмастере</a
            >
            <button class="top-nav__dropdown-btn dropdown-btn" type="button">
              <span class="dropdown-btn__text">Помощь</span>
              <span class="dropdown-btn__icon"
                ><svg
                  xmlns="http://www.w3.org/2000/svg"
                  height="10"
                  width="10"
                  viewBox="0 0 640 640"
                >
                  <path
                    fill="rgb(181, 202, 255)"
                    d="M297.4 438.6C309.9 451.1 330.2 451.1 342.7 438.6L502.7 278.6C515.2 266.1 515.2 245.8 502.7 233.3C490.2 220.8 469.9 220.8 457.4 233.3L320 370.7L182.6 233.4C170.1 220.9 149.8 220.9 137.3 233.4C124.8 245.9 124.8 266.2 137.3 278.7L297.3 438.7z"
                  />
                </svg>
              </span>
            </button>
          </nav>
        </div>
      </div>

      <div class="header__main">
        <div class="container header__container">
          <a href="/" class="header__logo">
            <img
              src="./public/icons/header/headerLogo.svg"
              alt="Спортмастер"
              class="header__logo-img"
            />
          </a>

          <button class="header__catalog-btn catalog-button">
            <span class="catalog-button__icon"
              ><svg
                xmlns="http://www.w3.org/2000/svg"
                height="20"
                width="20"
                viewBox="0 0 640 640"
              >
                <path
                  fill="#1551e5"
                  d="M96 160C96 142.3 110.3 128 128 128L512 128C529.7 128 544 142.3 544 160C544 177.7 529.7 192 512 192L128 192C110.3 192 96 177.7 96 160zM96 320C96 302.3 110.3 288 128 288L512 288C529.7 288 544 302.3 544 320C544 337.7 529.7 352 512 352L128 352C110.3 352 96 337.7 96 320zM544 480C544 497.7 529.7 512 512 512L128 512C110.3 512 96 497.7 96 480C96 462.3 110.3 448 128 448L512 448C529.7 448 544 462.3 544 480z"
                />
              </svg>
            </span>

            <span class="catalog-button__text">Каталог</span>
          </button>
        </div>
      </div>
    </header>
  </body>
</html>
